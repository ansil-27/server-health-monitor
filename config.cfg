# ============================================================
# config.cfg — Threshold Configuration File
# AutoOps Monitor | ASTRA DevOps Project
# ============================================================
# All threshold values are percentages (0–100).
# Scripts read this file at runtime using: source config.cfg
# ============================================================

# Alert if CPU usage exceeds this percentage
CPU_THRESHOLD=80

# Alert if memory usage exceeds this percentage
MEMORY_THRESHOLD=75

# Alert if disk usage on / exceeds this percentage
DISK_THRESHOLD=90

# Space-separated list of system services to monitor
SERVICES="ssh cron nginx"

# Log file path (relative to project root)
LOG_FILE="logs/health.log"

# HTML report output path
REPORT_FILE="reports/report.html"